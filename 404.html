<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Lupita &amp; Daniel</title>
  <script>
    // GitHub Pages SPA redirect: el sitio vive en la raíz de un dominio propio (CNAME),
    // así que solo guardamos la ruta completa y mandamos todo a "/".
    var l = window.location;
    sessionStorage.redirect = l.pathname + l.search + l.hash;
    l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/');
  </script>
</head>
<body></body>
</html>
